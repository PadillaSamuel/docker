name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-dept: 0
    - name: Git Semantic Version
      uses: PaulHatch/semantic-version@v4.0.3
      with:
        major_pattern: "major:"
        minor_pattern: "feat:"
        format: "${major}.${minor}.${patch}-prerelease${increment}"
      id: version
    - name: Docker login
      env:
        DOCKER_USER: ${{secrets.DOCKER_USER}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
    - name: Docker build
      env:
        NEW_VERSION: ${{steps.version.outputs.vesrsion}}
      run: | 
        docker build -t sampace05/docker-graphql:0.0.2 .
        docker build -t sampace05/docker-graphql:latest .
    - name: Docker push
      env:
        NEW_VERSION: ${{steps.version.outputs.vesrsion}}
      run: |
        docker push sampace05/docker-graphql:0.0.2
        docker push sampace05/docker-graphql:latest
  
    # - name: Build the Docker image
    #   run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
